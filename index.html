<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Jana Relief (v1.8.2)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
/* CSS Dikekalkan dari asal untuk mengekalkan paparan */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0f4f8;color:#1a202c;font-size:14px}
.app-header{background:#1a56db;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
.nav-tabs{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;padding:0 16px;overflow-x:auto}
.nav-tab{padding:11px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#64748b}
.nav-tab.active{border-bottom:2px solid #1a56db;color:#1a56db}
.page{display:none;padding:16px}.page.active{display:block}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:18px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;color:#1a56db;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #e2e8f0}
.btn{padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;border:none}
.btn-primary{background:#1a56db;color:#fff}.btn-success{background:#16a34a;color:#fff}
.input-field{width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:7px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f1f5f9;padding:8px;border:1px solid #e2e8f0}
td{padding:8px;border:1px solid #e2e8f0}
.alert{padding:10px;border-radius:8px;margin-bottom:10px;font-size:12px}
.alert-warning{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
</style>
</head>
<body>

<div class="app-header"><h1>📚 Sistem Jana Relief (v1.8.2)</h1></div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showTab('jana')" id="tab-jana">🏠 Jana Relief</div>
  <div class="nav-tab" onclick="showTab('jadual')" id="tab-jadual">📋 Jadual</div>
  <div class="nav-tab" onclick="showTab('tetapan')" id="tab-tetapan">⚙ Tetapan</div>
</div>

<div class="page active" id="page-jana">
  <div class="card">
    <div class="card-title">1. Tetapan Awal</div>
    <label><input type="checkbox" id="mod-peperiksaan"> <b>Mod Peperiksaan</b> (Aktifkan untuk elak pertindihan & kawalan ketat)</label>
    <div style="margin-top:10px">
        <label>Tarikh:</label> <input type="date" id="tarikh-input" class="input-field">
    </div>
  </div>

  <div class="card">
    <div class="card-title">2. Guru Tidak Hadir</div>
    <select id="pilih-guru" class="input-field" onchange="tambahAbsent()"></select>
    <div id="absent-list"></div>
    <button class="btn btn-primary" onclick="prosesJana()">Jana Relief</button>
  </div>

  <div id="hasil-area" class="card" style="display:none">
    <div class="card-title">Hasil Janaan</div>
    <div id="hasil-table"></div>
  </div>
</div>

<div class="page" id="page-tetapan">
    <div class="card">
        <div class="card-title">Tetapan Subjek & Kelas</div>
        <label>Subjek Bukan Relief (Pemisah koma):</label>
        <input type="text" id="excluded-subjects" class="input-field" placeholder="Tugas Rasmi, Mesyuarat, Kranian">
        <label>Kelas Khas / Teknikal (Pemisah koma):</label>
        <input type="text" id="special-classes" class="input-field" placeholder="AG, AM, RBT">
        <button class="btn btn-primary" onclick="simpanTetapan()">Simpan Tetapan</button>
    </div>
</div>

<script>
// Data
let appData = {
    guru: [], jadual: {}, excludedSubjects: [], specialClasses: [], rekod: []
};

// Logik Janaan Pintar
function prosesJana() {
    const isExamMode = document.getElementById('mod-peperiksaan').checked;
    const excluded = document.getElementById('excluded-subjects').value.split(',').map(s=>s.trim().toUpperCase());
    const special = document.getElementById('special-classes').value.split(',').map(s=>s.trim().toUpperCase());
    
    let hasil = [];
    let slotAssignment = {}; // Untuk simpan jadual guru dalam slot: { 'W1': ['G1', 'G2'] }

    // Dapatkan senarai guru tak hadir
    const absentData = getAbsentList(); // Anda perlu sesuaikan fungsi ini dengan struktur data anda

    absentData.forEach(absent => {
        // Dapatkan jadual hari ini
        const jadualHari = appData.jadual[getHari()]; 
        
        Object.keys(jadualHari[absent.id]).forEach(slot => {
            let kelas = jadualHari[absent.id][slot];
            if (!kelas) return;

            // 1. Tapis Subjek Bukan Relief
            let subjek = extractSubjek(kelas);
            if (excluded.includes(subjek.toUpperCase())) return;

            // 2. Semak jika Kelas Khas
            let isSpecial = special.some(s => subjek.includes(s));
            
            // 3. Cari Guru Ganti
            let calon = cariGuruGanti(slot, slotAssignment, isExamMode);

            if (calon) {
                // Rekod penggunaan slot untuk elak pertindihan
                if (!slotAssignment[slot]) slotAssignment[slot] = [];
                slotAssignment[slot].push(calon.id);

                hasil.push({
                    slot, absent: absent.nama, kelas, subjek,
                    ganti: calon.nama,
                    status: isSpecial ? 'PERLU SEMAKAN MANUAL' : 'OK'
                });
            }
        });
    });

    renderHasil(hasil);
}

function cariGuruGanti(slot, assignment, isExamMode) {
    // Tapis guru yang tidak ada kelas waktu itu
    // Jika Mod Peperiksaan, pastikan dia tiada kelas + TIDAK ditugaskan relief lain dalam slot sama
    let candidates = appData.guru.filter(g => {
        let adaKelas = checkJadual(g.id, slot); // Fungsi sedia ada anda
        if (adaKelas) return false;
        
        if (isExamMode && assignment[slot] && assignment[slot].includes(g.id)) return false;
        
        return true;
    });
    
    return candidates[0] || null; // Ambil yang pertama (boleh ditambah logik beban)
}

function renderHasil(data) {
    document.getElementById('hasil-area').style.display = 'block';
    let html = `<table><tr><th>Waktu</th><th>Guru Tak Hadir</th><th>Kelas</th><th>Guru Ganti</th><th>Status</th><th>Aksi</th></tr>`;
    data.forEach((r, idx) => {
        html += `<tr>
            <td>${r.slot}</td>
            <td>${r.absent}</td>
            <td>${r.kelas}</td>
            <td>${r.ganti}</td>
            <td>${r.status === 'PERLU SEMAKAN MANUAL' ? '<span style="color:red">⚠️ Perlu Manual</span>' : '✅'}</td>
            <td>${r.status === 'PERLU SEMAKAN MANUAL' ? '<button onclick="bukaModalManual()">Edit</button>' : ''}</td>
        </tr>`;
    });
    html += `</table>`;
    document.getElementById('hasil-table').innerHTML = html;
}

// Fungsi pembantu
function extractSubjek(str) { return str.split('-')[1]?.trim() || str; }
function getHari() { return document.getElementById('tarikh-input').value ? 'Isnin' : 'Isnin'; } // Sesuaikan dengan fungsi tarikh anda
function getAbsentList() { return []; } // Sesuaikan dengan list absensi anda
function simpanTetapan() {
    appData.excludedSubjects = document.getElementById('excluded-subjects').value;
    appData.specialClasses = document.getElementById('special-classes').value;
    localStorage.setItem('config', JSON.stringify({ex: appData.excludedSubjects, sp: appData.specialClasses}));
    alert('Tetapan disimpan!');
}
function showTab(t){ /* Fungsi tab anda */ }
</script>
</body>
</html>
